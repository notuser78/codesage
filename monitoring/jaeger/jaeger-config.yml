apiVersion: v1
kind: ConfigMap
metadata:
  name: jaeger-config
  namespace: codesage
data:
  jaeger.yml: |
    jaeger:
      serviceName: codesage
      sampler:
        type: const
        param: 1
      reporter:
        logSpans: true
        localAgentHostPort: jaeger-agent:6831
      headers:
        jaegerDebugHeader: jaeger-debug-id
        jaegerBaggageHeader: jaeger-baggage
        traceBaggageHeaderPrefix: uberctx-
