apiVersion: v1
kind: Secret
metadata:
  name: codesage-secrets
  namespace: codesage
type: Opaque
stringData:
  # Database
  POSTGRES_PASSWORD: "codesage_secret"
  DATABASE_URL: "postgresql://codesage:codesage_secret@postgres:5432/codesage"
  
  # Redis
  REDIS_PASSWORD: "redis_secret"
  REDIS_URL: "redis://:redis_secret@redis:6379/0"
  
  # Neo4j
  NEO4J_USER: "neo4j"
  NEO4J_PASSWORD: "neo4j_secret"
  
  # RabbitMQ
  RABBITMQ_USER: "codesage"
  RABBITMQ_PASSWORD: "rabbitmq_secret"
  RABBITMQ_URL: "amqp://codesage:rabbitmq_secret@rabbitmq:5672/"
  
  # JWT
  JWT_SECRET: "your-super-secret-jwt-key-change-in-production"
  JWT_ALGORITHM: "HS256"
  
  # External APIs
  GITHUB_TOKEN: ""
  GITLAB_TOKEN: ""
  BITBUCKET_TOKEN: ""
  HUGGINGFACE_TOKEN: ""
  
  # Grafana
  GRAFANA_PASSWORD: "admin"
---
apiVersion: v1
kind: Secret
metadata:
  name: api-secrets
  namespace: codesage
type: Opaque
stringData:
  SECRET_KEY: "your-api-secret-key-change-in-production"
  ADMIN_API_KEY: "admin-api-key-change-in-production"
---
apiVersion: v1
kind: Secret
metadata:
  name: llm-secrets
  namespace: codesage
type: Opaque
stringData:
  MODEL_DOWNLOAD_TOKEN: ""
  HUGGINGFACE_TOKEN: ""
