apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: codesage
  labels:
    app: worker
    component: analysis
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
        component: analysis
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: worker
          image: codesage/worker:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: metrics
          envFrom:
            - configMapRef:
                name: codesage-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: codesage-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: codesage-secrets
                  key: REDIS_URL
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: codesage-secrets
                  key: RABBITMQ_URL
            - name: LLM_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: codesage-config
                  key: LLM_SERVICE_URL
            - name: KNOWLEDGE_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: codesage-config
                  key: KNOWLEDGE_SERVICE_URL
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          livenessProbe:
            exec:
              command:
                - celery
                - -A
                - worker
                - inspect
                - ping
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: worker
  namespace: codesage
  labels:
    app: worker
spec:
  selector:
    app: worker
  ports:
    - port: 8080
      targetPort: 8080
      name: metrics
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: worker-hpa
  namespace: codesage
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: worker
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: External
      external:
        metric:
          name: rabbitmq_queue_messages
          selector:
            matchLabels:
              queue: analysis
        target:
          type: AverageValue
          averageValue: "10"
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
