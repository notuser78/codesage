version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    allow:
      - dependency-type: "direct"
    ignore:
      - dependency-name: "torch"
        # Torch is pinned due to compatibility with the current LLM service; update manually.

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
