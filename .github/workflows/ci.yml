name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/api/requirements.txt
          pip install -r services/analysis/requirements.txt
          pip install -r services/llm/requirements.txt
          pip install -r services/knowledge/requirements.txt
          pip install -r training/requirements.txt
          pip install pytest pytest-cov flake8 pylint black isort

      - name: Run unit tests
        run: make test-unit

      - name: Run lint
        run: make lint

      - name: Generate coverage report
        run: |
          pytest tests/ -q --cov=services --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
