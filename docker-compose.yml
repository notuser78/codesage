version: '3.8'

services:
  # Infrastructure
  postgres:
    image: postgres:15-alpine
    container_name: codesage-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-codesage}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codesage_secret}
      POSTGRES_DB: ${POSTGRES_DB:-codesage}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codesage"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codesage-network

  redis:
    image: redis:7-alpine
    container_name: codesage-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codesage-network

  neo4j:
    image: neo4j:5-community
    container_name: codesage-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4j_secret}
      NEO4J_PLUGINS: '["apoc", "gds"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 2G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "7474:7474"
      - "7687:7687"
    networks:
      - codesage-network

  weaviate:
    image: semitechnologies/weaviate:1.24.0
    container_name: codesage-weaviate
    command:
      - --host
      - 0.0.0.0
      - --port
      - '8080'
      - --scheme
      - http
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      DEFAULT_VECTORIZER_MODULE: 'none'
      ENABLE_MODULES: ''
      CLUSTER_HOSTNAME: 'node1'
    volumes:
      - weaviate_data:/var/lib/weaviate
    ports:
      - "8080:8080"
    networks:
      - codesage-network

  # Message Queue
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: codesage-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-codesage}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-rabbitmq_secret}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - codesage-network

  # Core Services
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: codesage-api
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-codesage}:${POSTGRES_PASSWORD:-codesage_secret}@postgres:5432/${POSTGRES_DB:-codesage}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-neo4j_secret}
      - WEAVIATE_URL=http://weaviate:8080
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-codesage}:${RABBITMQ_PASSWORD:-rabbitmq_secret}@rabbitmq:5672/
      - LLM_SERVICE_URL=http://llm:8000
      - KNOWLEDGE_SERVICE_URL=http://knowledge:8000
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      - RATE_LIMIT_REQUESTS=${RATE_LIMIT_REQUESTS:-100}
      - RATE_LIMIT_WINDOW=${RATE_LIMIT_WINDOW:-60}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_started
      weaviate:
        condition: service_started
      rabbitmq:
        condition: service_started
    volumes:
      - ./services/api:/app
      - /app/__pycache__
    networks:
      - codesage-network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./services/analysis
      dockerfile: Dockerfile
    container_name: codesage-worker
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-codesage}:${POSTGRES_PASSWORD:-codesage_secret}@postgres:5432/${POSTGRES_DB:-codesage}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-codesage}:${RABBITMQ_PASSWORD:-rabbitmq_secret}@rabbitmq:5672/
      - LLM_SERVICE_URL=http://llm:8000
      - KNOWLEDGE_SERVICE_URL=http://knowledge:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    volumes:
      - ./services/analysis:/app
      - /app/__pycache__
    networks:
      - codesage-network
    command: celery -A worker worker --loglevel=info --concurrency=4

  llm:
    build:
      context: ./services/llm
      dockerfile: Dockerfile
    container_name: codesage-llm
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - MODEL_PATH=${MODEL_PATH:-/models}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-codellama-7b}
      - DEVICE=${DEVICE:-cpu}
      - MAX_BATCH_SIZE=${MAX_BATCH_SIZE:-4}
      - MAX_SEQUENCE_LENGTH=${MAX_SEQUENCE_LENGTH:-4096}
    ports:
      - "8001:8000"
    volumes:
      - llm_models:/models
      - ./services/llm:/app
      - /app/__pycache__
    networks:
      - codesage-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  knowledge:
    build:
      context: ./services/knowledge
      dockerfile: Dockerfile
    container_name: codesage-knowledge
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-neo4j_secret}
      - WEAVIATE_URL=http://weaviate:8080
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
    ports:
      - "8002:8000"
    depends_on:
      neo4j:
        condition: service_started
      weaviate:
        condition: service_started
    volumes:
      - ./services/knowledge:/app
      - /app/__pycache__
    networks:
      - codesage-network


  web:
    build:
      context: ./clients/web
      dockerfile: Dockerfile
    container_name: codesage-web
    ports:
      - "5173:80"
    depends_on:
      - api
    networks:
      - codesage-network

  # Monitoring
  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: codesage-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - codesage-network

  grafana:
    image: grafana/grafana:10.3.0
    container_name: codesage-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - codesage-network

  jaeger:
    image: jaegertracing/all-in-one:1.50
    container_name: codesage-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    networks:
      - codesage-network

  # API Gateway
  kong:
    image: kong:3.5
    container_name: codesage-kong
    environment:
      - KONG_DATABASE=off
      - KONG_DECLARATIVE_CONFIG=/kong/declarative/kong.yml
      - KONG_PROXY_ACCESS_LOG=/dev/stdout
      - KONG_ADMIN_ACCESS_LOG=/dev/stdout
      - KONG_PROXY_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_ERROR_LOG=/dev/stderr
      - KONG_PLUGINS=bundled,rate-limiting,prometheus
    volumes:
      - ./kong/kong.yml:/kong/declarative/kong.yml
    ports:
      - "8008:8000"
      - "8443:8443"
      - "8009:8001"
      - "8444:8444"
    networks:
      - codesage-network

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
  weaviate_data:
  rabbitmq_data:
  llm_models:
  prometheus_data:
  grafana_data:

networks:
  codesage-network:
    driver: bridge
